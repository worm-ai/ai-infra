id: release-smoke-workflow
name: Release Smoke Workflow
version: "0.1"
schema_version: "1"
features:
  - template_nodes
  - edge_list
  - validations
entrypoint: draft
nodes:
  draft:
    type: template
    template: "Draft a short note about {topic}."
    next: review
  review:
    type: template
    template: "Review result: {draft}"
edges:
  - from: draft
    to: review
validations:
  - type: run_status
    equals: completed
  - type: node_completed
    node: draft
  - type: node_completed
    node: review
