id: react-openai-compatible-dry-run
name: OpenAI-Compatible ReAct Dry Run Workflow
version: "0.1"
entrypoint: answer
nodes:
  answer:
    type: react
    config:
      provider: openai-compatible
      model: fake-chat
      base_url: http://127.0.0.1:9
      api_key_env: AI_INFRA_FAKE_OPENAI_API_KEY
      timeout_ms: 1000
      provider_runtime:
        mode: dry_run
        reason: local provider governance rehearsal
      prompt: "Answer {question}"
      max_steps: 1
      budget:
        max_total_tokens: 100
        max_cost_usd: 0.01
        prompt_cost_per_1k_tokens: 0.001
        completion_cost_per_1k_tokens: 0.002
validations:
  - type: run_status
    equals: completed
  - type: node_completed
    node: answer
  - type: assertion
    source: node_output
    node: answer
    path: react.provider.status
    equals: dry_run
  - type: assertion
    source: report
    path: timeline.0.react.provider.governance.runtime.network_attempted
    equals: false
